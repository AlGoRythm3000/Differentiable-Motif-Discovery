name: dmd
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8 
  - pyg
  - networkx
  - numpy
  - matplotlib
  - scikit-learn
  - scipy
  - ipykernel
  - pytest
  - pip:
    - topomodelx
    - optuna
    - --find-links https://data.pyg.org/whl/torch-2.0.1+cu118.html
    - torch-scatter
    - torch-sparse
    - torch-cluster
    - torch-spline-conv